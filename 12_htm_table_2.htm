<!DOCTYPE html>
<html>
<head>
    <title>Student Information Table</title>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Student Information</h2>

    <table>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Class</th>
            <th>Age</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>06</td>

            <td>89</td>
        </tr>
        <tr>
            <td>32</td>
            <td>monika yachawad</td>
            <td>12</td>
            <td>16</td>
            <td>92</td>
        </tr>

            <td>61</td>
            <td>sadhavi pawar</td>
            <td>12</td>
            <td>15</td>
            <td>85</td>
        </tr>
    </table>

</body>
</html>
